name: prt 2

on:
  pull_request_target:

permissions:
  contents: read

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Dump github context
        env:
          GITHUB_CONTEXT: ${{ toJSON(github) }}
        run: |
          echo "===== github context ====="
          echo "$GITHUB_CONTEXT"

      - name: Dump repository IDs
        run: |
          echo "github.repository           = ${{ github.repository }}"
          echo "github.repository.id        = ${{ github.repository.id }}"
          echo "github.repository_id        = ${{ github.repository_id }}"
          echo "github.repository_owner     = ${{ github.repository_owner }}"
          echo "github.repository_owner_id  = ${{ github.repository_owner_id }}"
          echo "github.event.repository.id  = ${{ github.event.repository.id }}"

